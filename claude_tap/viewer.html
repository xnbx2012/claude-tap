<title>claude-tap Viewer</title>
<style>
:root {
  --bg: #f4f5f7;
  --bg-card: #ffffff;
  --bg-hover: #f0f1f4;
  --bg-active: #e8ecf4;
  --bg-code: #f6f8fa;
  --border: #e2e4e9;
  --border-light: #edeef1;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --radius: 10px;
  --radius-sm: 6px;

  --text: #1c2024;
  --text-secondary: #60646c;
  --text-tertiary: #a0a4ab;

  --blue: #3b82f6;
  --blue-bg: #eff6ff;
  --green: #10b981;
  --green-bg: #ecfdf5;
  --amber: #f59e0b;
  --amber-bg: #fffbeb;
  --red: #ef4444;
  --red-bg: #fef2f2;
  --red-bg-hi: #fecaca;
  --green-bg-hi: #bbf7d0;
  --purple: #8b5cf6;
  --purple-bg: #f5f3ff;
  --cyan: #06b6d4;
  --cyan-bg: #ecfeff;
  --orange: #f97316;
  --orange-bg: #fff7ed;
  --indigo: #6366f1;

  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
}
[data-theme="dark"] {
  --bg: #0d1117;
  --bg-card: #161b22;
  --bg-hover: #1c2128;
  --bg-active: #252c35;
  --bg-code: #1c2128;
  --border: #30363d;
  --border-light: #21262d;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.4);
  --text: #e6edf3;
  --text-secondary: #8b949e;
  --text-tertiary: #6e7681;
  --blue: #58a6ff;
  --blue-bg: #0d2240;
  --green: #3fb950;
  --green-bg: #0d2d1a;
  --amber: #d29922;
  --amber-bg: #2d2200;
  --red: #f85149;
  --red-bg: #3d1117;
  --red-bg-hi: #6b2020;
  --green-bg-hi: #1a5c33;
  --purple: #bc8cff;
  --purple-bg: #1f1338;
  --cyan: #39d2c0;
  --cyan-bg: #0a2e2c;
  --orange: #f0883e;
  --orange-bg: #2d1b00;
  --indigo: #8b8fff;
}
[data-theme="dark"] .msg.user { border-color: #1f3a5f; }
[data-theme="dark"] .msg.assistant { border-color: #1a3a26; }
[data-theme="dark"] .msg.system { border-color: #3d3000; }
[data-theme="dark"] .msg.tool_result { border-color: #2a1f48; }
[data-theme="dark"] .msg pre, [data-theme="dark"] .msg .pre-text { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.06); }
[data-theme="dark"] .json-view .jk { color: #bc8cff; }
[data-theme="dark"] .json-view .js { color: #3fb950; }
[data-theme="dark"] .json-view .jn { color: #d29922; }
[data-theme="dark"] .json-view .jb { color: #f85149; }
*,*::before,*::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; }

/* ─── Header ─── */
.header {
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px; min-height: 52px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 10;
}
.header .logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.header .logo svg { width: 22px; height: 22px; }
.header .logo span { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
.header .logo .logo-version {
  display: none; align-items: center;
  font-size: 10px; font-weight: 600; letter-spacing: 0.2px;
  color: var(--text-tertiary); background: var(--bg);
  border: 1px solid var(--border); border-radius: 999px;
  padding: 1px 6px; line-height: 1.4;
}
.header .divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
.path-filter { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; min-width: 0; flex: 1 1 0; }
.filter-chip-toggle {
  font-size: 11px; font-family: var(--sans); padding: 4px 10px; border-radius: 20px;
  border: 1px dashed var(--border); background: var(--bg); color: var(--text-tertiary);
  cursor: pointer; transition: all .15s; white-space: nowrap; line-height: 1;
}
.filter-chip-toggle:hover { border-color: var(--blue); color: var(--blue); }
.filter-chip {
  font-size: 12px; font-family: var(--mono); padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary);
  cursor: pointer; transition: all .15s; white-space: nowrap; line-height: 1;
}
.filter-chip:hover { border-color: var(--blue); color: var(--blue); }
.filter-chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }
.filter-chip .chip-count { font-size: 10px; margin-left: 4px; opacity: .6; }
.stats {
  margin-left: auto; display: flex; gap: 16px; font-size: 12px; color: var(--text-tertiary); flex-shrink: 0;
}
.stats .stat-group { display: flex; align-items: center; gap: 4px; }
.stats .stat-val { font-weight: 600; color: var(--text-secondary); font-family: var(--mono); }
.trace-path-bar {
  display: none; align-items: center; gap: 6px; padding: 4px 12px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  font-size: 11px; color: var(--text-tertiary); font-family: var(--mono);
  flex-shrink: 0;
}
.trace-path-bar .tp-label { font-family: var(--sans); font-weight: 500; color: var(--text-secondary); flex-shrink: 0; }
.trace-path-bar .tp-val { flex: 1 1 0; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; direction: rtl; text-align: left; }
.trace-path-bar .tp-copy {
  flex-shrink: 0; cursor: pointer; border: none; background: none;
  color: var(--text-tertiary); padding: 2px 4px; border-radius: 3px; line-height: 1;
}
.trace-path-bar .tp-copy:hover { color: var(--blue); background: var(--blue-bg); }
.trace-path-bar .tp-sep { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }

/* ─── Layout ─── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ─── Sidebar ─── */
#sidebar-wrap {
  width: 300px; min-width: 260px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--bg-card);
}
.sidebar {
  overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.sidebar-group-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; cursor: pointer; user-select: none;
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
  background: var(--bg); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 1;
  text-transform: uppercase; letter-spacing: .5px;
}
.sidebar-group-header:hover { background: var(--bg-hover); }
.sidebar-group-header .group-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.sidebar-group-header .group-name { flex: 1; }
.sidebar-group-header .group-count {
  font-size: 10px; font-weight: 500; color: var(--text-tertiary);
  background: var(--bg-hover); padding: 1px 6px; border-radius: 8px;
}
.sidebar-group-header .group-chevron {
  font-size: 10px; color: var(--text-tertiary); transition: transform .15s;
}
.sidebar-group-header .group-chevron.open { transform: rotate(90deg); }

.sidebar-item {
  padding: 10px 16px; cursor: pointer; transition: background .1s;
  border-bottom: 1px solid var(--border-light); position: relative;
  border-left: 3px solid transparent;
}
.sidebar-item:hover { background: var(--bg-hover); }
.sidebar-item.active { background: var(--blue-bg); }
.sidebar-item .si-row1 { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.sidebar-item .si-turn-wrap { display: inline-flex; align-items: center; gap: 6px; min-width: 0; }
.sidebar-item .si-turn { font-size: 13px; font-weight: 600; color: var(--text); }
.sidebar-item .si-error-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red); box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
  flex-shrink: 0;
}
.sidebar-item.is-error { border-left-color: var(--red) !important; }
.sidebar-item.is-error .si-path { color: var(--red); }
.sidebar-item .si-model {
  font-size: 11px; padding: 1px 6px; border-radius: 4px;
  font-weight: 500; margin-left: auto;
}
.sidebar-item .si-row2 { display: flex; gap: 10px; font-size: 11px; }
.sidebar-item .si-tok { color: var(--green); font-family: var(--mono); font-weight: 500; }
.sidebar-item .si-dur { color: var(--amber); font-family: var(--mono); font-weight: 500; }
.sidebar-item .si-time { color: var(--text-tertiary); font-family: var(--mono); font-weight: 500; margin-left: auto; }
.sidebar-item .si-task {
  font-size: 10px; padding: 1px 5px; border-radius: 3px;
  font-weight: 500; white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-item .si-path {
  font-size: 10px; color: var(--text-tertiary); font-family: var(--mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px;
}

/* ─── Detail ─── */
.detail { flex: 1; overflow-y: auto; padding: 12px 20px; background: var(--bg); }
.detail::-webkit-scrollbar { width: 6px; }
.detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.error-banner {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 14px; margin: 0 0 12px;
  border: 1px solid var(--red); border-left: 4px solid var(--red);
  border-radius: var(--radius-sm); background: var(--red-bg);
}
.error-banner .eb-icon { color: var(--red); font-size: 15px; line-height: 1.2; flex-shrink: 0; }
.error-banner .eb-content { min-width: 0; }
.error-banner .eb-title { font-size: 13px; font-weight: 700; color: var(--red); line-height: 1.4; }
.error-banner .eb-message {
  margin-top: 2px; font-size: 12px; color: var(--text-secondary);
  white-space: pre-wrap; word-break: break-word;
}
.continuation-banner {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 14px; margin: 0 0 12px;
  border: 1px solid var(--amber); border-left: 4px solid var(--amber);
  border-radius: var(--radius-sm); background: var(--amber-bg);
}
.continuation-banner .cb-icon { color: var(--amber); font-size: 15px; line-height: 1.2; flex-shrink: 0; }
.continuation-banner .cb-content { min-width: 0; }
.continuation-banner .cb-title { font-size: 13px; font-weight: 700; color: var(--amber); line-height: 1.4; }
.continuation-banner .cb-message {
  margin-top: 2px; font-size: 12px; color: var(--text-secondary);
  white-space: pre-wrap; word-break: break-word;
}
.continuation-banner .cb-meta {
  display: grid; grid-template-columns: max-content minmax(0, 1fr);
  gap: 4px 10px; margin-top: 10px; font-size: 11px;
}
.continuation-banner .cb-key { color: var(--text-tertiary); font-family: var(--mono); }
.continuation-banner .cb-val {
  color: var(--text); font-family: var(--mono);
  overflow-wrap: anywhere;
}

/* ─── Action bar ─── */
.action-bar {
  display: inline-flex; align-items: center; gap: 4px; flex-wrap: wrap;
  position: sticky; top: 6px; z-index: 6;
  width: fit-content; max-width: 100%;
  margin: 0 0 8px;
  padding: 4px 6px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
}
.act-btn {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; padding: 4px 8px; border-radius: 6px;
  border: none; background: transparent;
  color: var(--text-secondary); cursor: pointer; font-family: var(--sans);
  transition: all .15s;
}
.act-btn:hover { background: var(--bg-hover); color: var(--blue); }
.act-btn:active { transform: translateY(1px); }
.act-btn svg { width: 12px; height: 12px; }
[data-theme="dark"] .action-bar {
  background: rgba(22, 27, 34, 0.82);
  border-color: #3a4048;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
}

/* ─── Section ─── */
.section {
  margin-bottom: 8px; border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  background: var(--bg-card); box-shadow: var(--shadow-sm);
}
.section-header {
  display: flex; align-items: center; padding: 8px 12px;
  cursor: pointer; user-select: none; gap: 8px;
  transition: background .1s;
}
.section-header:hover { background: var(--bg-hover); }
.section-header .chevron {
  font-size: 10px; color: var(--text-tertiary); transition: transform .2s; width: 12px;
}
.section-header .chevron.open { transform: rotate(90deg); }
.section-header .title { font-size: 13px; font-weight: 600; color: var(--text); }
.section-header .badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: var(--bg); color: var(--text-tertiary); font-weight: 500; margin-left: auto;
}
.section-header .copy-btn {
  font-size: 11px; padding: 3px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-card);
  color: var(--text-tertiary); cursor: pointer; margin-left: 6px; transition: all .15s;
}
.section-header .copy-btn:hover { color: var(--blue); border-color: var(--blue); }
.section-body { padding: 0 16px 16px; display: none; overflow-x: auto; }
.section-body.open { display: block; }
.section-body pre, .section-body .pre-text {
  white-space: pre-wrap; word-break: break-word; font-family: var(--mono);
  font-size: 12px; background: var(--bg-code); padding: 12px 14px;
  border-radius: var(--radius-sm); line-height: 1.6; border: 1px solid var(--border-light);
  max-height: 500px; overflow-y: auto;
}

/* ─── Messages ─── */
.msg {
  margin-bottom: 8px; border-radius: var(--radius-sm);
  padding: 12px 16px; font-size: 13px; line-height: 1.6;
  border: 1px solid var(--border-light);
}
.msg.user { background: var(--blue-bg); border-color: #c7d2fe; }
.msg.assistant { background: var(--green-bg); border-color: #a7f3d0; }
.msg.system { background: var(--amber-bg); border-color: #fde68a; }
.msg.tool_result { background: var(--purple-bg); border-color: #c4b5fd; }
.msg-role {
  display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px;
}
.msg.user .msg-role { background: var(--blue); color: #fff; }
.msg.assistant .msg-role { background: var(--green); color: #fff; }
.msg.system .msg-role { background: var(--amber); color: #fff; }
.msg.tool_result .msg-role { background: var(--purple); color: #fff; }
.msg pre, .msg .pre-text {
  white-space: pre-wrap; word-break: break-word; font-family: var(--mono);
  font-size: 12px; background: rgba(0,0,0,0.04); padding: 10px 12px;
  border-radius: var(--radius-sm); margin-top: 8px; max-height: 400px;
  overflow-y: auto; border: 1px solid rgba(0,0,0,0.06); line-height: 1.5;
}
.content-block { margin-top: 8px; white-space: pre-wrap; word-break: break-word; }
.content-block:first-child { margin-top: 0; }
.tool-use-label {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600; color: var(--cyan);
  background: var(--cyan-bg); padding: 2px 8px; border-radius: 4px; margin-bottom: 4px;
}
.thinking-label {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600; color: var(--indigo);
  background: #eef2ff; padding: 2px 8px; border-radius: 4px; margin-bottom: 4px;
}

/* ─── Tool blocks ─── */
.tool-block {
  border: 1px solid var(--border-light); border-radius: var(--radius-sm);
  margin-bottom: 4px; overflow: hidden; background: var(--bg-card);
}
.tool-block-header {
  display: flex; align-items: baseline; gap: 10px;
  padding: 8px 12px; cursor: pointer; user-select: none; transition: background .1s;
}
.tool-block-header:hover { background: var(--bg-hover); }
.tb-arrow { font-size: 9px; color: var(--text-tertiary); transition: transform .15s; flex-shrink: 0; }
.tb-arrow.open { transform: rotate(90deg); }
.tb-name { color: var(--cyan); font-family: var(--mono); font-size: 12px; font-weight: 600; flex-shrink: 0; }
.tb-desc { color: var(--text-tertiary); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.tool-block-body {
  display: none; padding: 10px 12px 12px; border-top: 1px solid var(--border-light); font-size: 12px;
}
.tool-block-body.open { display: block; }
.tb-full-desc {
  color: var(--text-secondary); white-space: pre-wrap; word-break: break-word;
  margin-bottom: 10px; line-height: 1.55; font-size: 12px;
}
.tb-params-title { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .3px; }
.tb-param {
  padding: 8px 10px; margin-bottom: 4px; border-radius: var(--radius-sm);
  background: var(--bg); font-size: 12px;
}
.tb-param:last-child { margin-bottom: 0; }
.tb-param-row1 { display: flex; align-items: center; gap: 8px; }
.tb-pname { color: var(--blue); font-family: var(--mono); font-weight: 600; font-size: 12px; }
.tb-ptype {
  font-size: 10px; font-family: var(--mono); color: var(--amber);
  background: var(--amber-bg); padding: 1px 6px; border-radius: 3px; font-weight: 500;
}
.tb-prequired {
  font-size: 10px; font-weight: 600; color: var(--red);
  background: var(--red-bg); padding: 1px 6px; border-radius: 3px;
}
.tb-pdesc {
  color: var(--text-tertiary); margin-top: 4px; line-height: 1.5;
  white-space: pre-wrap; word-break: break-word; font-size: 12px;
}

/* ─── Token usage ─── */
.token-bar { display: flex; gap: 12px; font-size: 11px; padding: 4px 0 6px; flex-wrap: wrap; margin-bottom: 4px; }
.tok-item { display: flex; align-items: center; gap: 4px; }
.tok-dot { width: 6px; height: 6px; border-radius: 50%; }
.tok-label { color: var(--text-tertiary); font-size: 11px; }
.tok-val { color: var(--text-secondary); font-weight: 600; font-family: var(--mono); font-size: 11px; }

/* ─── JSON viewer ─── */
.json-view {
  font-family: var(--mono); font-size: 12px; white-space: pre-wrap; word-break: break-word;
  max-height: 600px; overflow-y: auto; line-height: 1.55;
  background: var(--bg-code); padding: 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
}
.json-view .jk { color: #7c3aed; }
.json-view .js { color: #059669; }
.json-view .jn { color: #d97706; }
.json-view .jb { color: #dc2626; }
.json-view .jnull { color: var(--text-tertiary); }

/* ─── Diff modal ─── */
.diff-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  display: flex; align-items: center; justify-content: center;
  overflow-y: auto; padding: 16px 12px;
  z-index: 100; backdrop-filter: blur(2px);
}
.diff-modal {
  background: var(--bg); border-radius: 14px;
  width: 96vw; max-width: 1400px; height: 92vh; max-height: 92vh;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.2);
}
.diff-header {
  display: flex; align-items: center; padding: 16px 20px;
  background: var(--bg-card); border-bottom: 1px solid var(--border);
  border-radius: 14px 14px 0 0;
}

.diff-section {

}

}
.diff-new-msg::before {
  content: attr(data-label); position: absolute; top: -1px; right: 10px;
  font-size: 9px; font-weight: 700; letter-spacing: .5px;
  color: #fff; background: var(--green); padding: 2px 8px;
  border-radius: 0 0 4px 4px;
}
.diff-removed-msg {
  position: relative; margin-bottom: 8px;
  border: 2px solid var(--red); border-radius: var(--radius-sm); opacity: .7;
  max-height: 220px; overflow-y: auto;
}
.diff-removed-msg::before {
  content: attr(data-label); position: absolute; top: -1px; right: 10px;
  font-size: 9px; font-weight: 700; letter-spacing: .5px;
  color: #fff; background: var(--red); padding: 2px 8px;
  border-radius: 0 0 4px 4px;
}
.diff-modified-msg {

.diff-field-row {

}

.diff-field-new {

  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
/* ─── Side-by-side JSON diff ─── */
.diff-side-by-side { display: flex; gap: 2px; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.diff-side-by-side .diff-panel { flex: 1; min-width: 0; overflow: auto; }
.diff-side-by-side .diff-panel-header {

}
.diff-side-by-side .diff-panel.old { background: var(--red-bg); }

  line-height: 1.5; white-space: pre-wrap; word-break: break-word; color: var(--text);
}

/* ─── Side-by-side line diff ─── */
.sbs-diff {
  display: grid; grid-template-columns: 1fr 1fr;
  font-family: var(--mono); font-size: 12px; line-height: 1.6;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  overflow: auto; max-height: 400px;
}
.sbs-diff .sbs-header {

}
.sbs-diff .sbs-header.old { color: var(--red); }
.sbs-diff .sbs-header.new { color: var(--green); }
.sbs-cell {
  padding: 1px 10px; white-space: pre-wrap; word-break: break-word;
  border-bottom: 1px solid var(--border-light);
}
.sbs-cell.ctx { color: var(--text-tertiary); opacity: 0.5; }
.sbs-cell.del { background: var(--red-bg); color: var(--red); }
.sbs-cell.add { background: var(--green-bg); color: var(--green); }
.sbs-cell.empty { background: var(--bg-code); }
.sbs-fold {
  grid-column: 1 / -1; text-align: center;
  padding: 2px 12px; color: var(--text-tertiary); font-style: italic;
  background: var(--bg); border-top: 1px solid var(--border-light);
  border-bottom: 1px solid var(--border-light); font-size: 11px;
}
.sys-diff-del-hi { background: var(--red-bg-hi); border-radius: 3px; padding: 1px 1px; }
.sys-diff-add-hi { background: var(--green-bg-hi); border-radius: 3px; padding: 1px 1px; }

/* ─── SSE events ─── */
.sse-event { margin-bottom: 4px; font-family: var(--mono); font-size: 12px; padding: 3px 0; }
.sse-type { color: var(--cyan); font-weight: 600; margin-right: 8px; }
.sse-data { color: var(--text-tertiary); white-space: pre-wrap; word-break: break-word; }

/* ─── Drop zone ─── */
.drop-zone { display: flex; align-items: center; justify-content: center; flex: 1; padding: 40px; }
.drop-zone-inner {
  border: 2px dashed var(--border); border-radius: 16px;
  padding: 60px 40px; text-align: center; max-width: 480px;
  transition: all .25s; background: var(--bg-card);
}
.drop-zone-inner.dragover { border-color: var(--blue); background: var(--blue-bg); }
.drop-zone-inner h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; font-weight: 600; }
.drop-zone-inner p { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
.drop-zone-inner input[type="file"] { display: none; }
.drop-zone-inner label {

}
.drop-zone-inner label:hover { background: #2563eb; }

/* ─── Empty state ─── */
.empty-state { padding: 40px; text-align: center; color: var(--text-tertiary); font-size: 14px; }

/* ─── Scrollbar for detail ─── */
/* ─── Search bar ─── */
.search-bar {

  background: var(--bg-card);
}
.search-bar input {

}
.search-bar input:focus { border-color: var(--blue); }
.search-bar input::placeholder { color: var(--text-tertiary); }

}
.search-bar .search-clear {

  font-size: 14px; padding: 2px 4px; display: none; line-height: 1;
}
.search-bar .search-clear:hover { color: var(--text); }

/* ─── Global find (Cmd/Ctrl+F) ─── */
.global-search-overlay {

}

}

/* ─── Virtual scroll sidebar ─── */
.sidebar.virtual-scroll {

}

/* ─── Time gap indicator ─── */
.time-gap {

}

/* ─── Theme toggle ─── */
.theme-toggle {
  background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);

}

/* ─── Language selector ─── */
.lang-select {
  font-size: 12px; padding: 4px 8px; border-radius: var(--radius-sm);

}

/* ─── RTL support ─── */

[dir="rtl"] .sidebar-item { border-left: none; border-right: 3px solid transparent; }

@media (max-width: 900px) {
  .sidebar { width: 240px; min-width: 200px; }
  .detail { padding: 16px; }
}

/* Mobile back button hidden by default on desktop */
#mobile-back-btn { display: none; }

/* Mobile prev/next nav bar — hidden on desktop */
#mobile-nav-bar { display: none; }

/* ─── Mobile responsive (≤ 768px) ─── */
@media (max-width: 768px) {

  /* R1: Stacked layout — sidebar + detail stack vertically */
  body { overflow: auto; }

  .stats {

    justify-content: center;

    padding: 10px 16px;

    white-space: pre-wrap;

<script>
const $ = s => document.querySelector(s);
let entries = [], filtered = [], activeIdx = -1, activePaths = new Set(), searchQuery = '', activeTools = null;
let visualOrder = []; // filtered indices in sidebar visual (DOM) order, excludes collapsed items

function cloneJson(value) {
  if (value === undefined || value === null) return value;
  try { return JSON.parse(JSON.stringify(value)); } catch(e) { return value; }
}

function isCodexResponsesWebSocketEntry(entry) {
  if (entry?.transport !== 'websocket') return false;
  const path = entry?.request?.path || '';
  return path.endsWith('/backend-api/codex/responses') || path.endsWith('/v1/responses') || path === '/responses';
}

function getResponseIdFromEvent(event) {
  const data = getEventData(event);
  return data?.response?.id || data?.item?.id || data?.item_id || '';
}

function responseEventMatchesId(event, responseId) {
  if (!responseId) return false;
  const data = getEventData(event);
  if (data?.response?.id === responseId) return true;
  const itemId = data?.item?.id || data?.item_id || '';
  return itemId.includes(responseId.slice(5, 25));
}

function splitWebSocketResponseEvents(events) {
  const groups = [];
  let current = null;
  for (const event of events || []) {
    const type = getEventType(event);
    if (type === 'response.created') {
      if (current && current.events.length) groups.push(current);
      current = { responseId: getResponseIdFromEvent(event), events: [event] };
      continue;
    }
    if (!current) continue;
    if (responseEventMatchesId(event, current.responseId) || type.startsWith('response.')) {
      current.events.push(event);
    }
    if (type === 'response.completed') {
      groups.push(current);
      current = null;
    }
  }
  if (current && current.events.length) groups.push(current);
  return groups.filter(group => group.events.some(event => getEventType(event) === 'response.completed'));
}

function completedResponseFromEvents(events) {
  for (let i = events.length - 1; i >= 0; i--) {
    if (getEventType(events[i]) !== 'response.completed') continue;
    const data = getEventData(events[i]);
    if (data?.response && typeof data.response === 'object') return data.response;
  }
  return null;
}

function hasOutputItemEvent(events) {
  return events.some(event => getEventType(event) === 'response.output_item.done');
}

function isDisplayableWebSocketResponseGroup(group) {
  const completed = completedResponseFromEvents(group.events);
  if (!completed) return false;
  return !(completed.generate === false && !hasOutputItemEvent(group.events) && (completed.usage?.output_tokens || 0) === 0);
}

function responseCreatedFromEvents(events) {
  for (const event of events) {
    if (getEventType(event) !== 'response.created') continue;
    const data = getEventData(event);
    if (data?.response && typeof data.response === 'object') return data.response;
  }
  return null;
}

function mergeWebSocketResponseGroups(groups) {
  const events = [];
  for (const group of groups) events.push(...group.events);
  return { responseId: groups.map(group => group.responseId).filter(Boolean).join('+'), events };
}

function parseResponseToolArguments(args) {
  if (args === undefined || args === null || args === '') return {};
  if (typeof args !== 'string') return args;
  try { return JSON.parse(args); } catch(e) { return args; }
}

function toolSearchOutputContent(item) {
  const names = [];
  if (Array.isArray(item?.tools)) {
    for (const namespace of item.tools) {
      if (!namespace || typeof namespace !== 'object') continue;
      const namespaceName = typeof namespace.name === 'string' ? namespace.name : '';
      if (namespaceName) names.push(namespaceName);
      if (!Array.isArray(namespace.tools)) continue;
      for (const tool of namespace.tools) {
        if (!tool || typeof tool !== 'object' || typeof tool.name !== 'string' || !tool.name) continue;
        names.push(namespaceName ? `${namespaceName}.${tool.name}` : tool.name);
      }
    }
  }
  if (names.length) return ['tool_search_output', ...names].join('\n');
  if (Array.isArray(item?.tools)) return JSON.stringify(item.tools, null, 2);
  if (item?.output !== undefined) return typeof item.output === 'string' ? item.output : JSON.stringify(item.output, null, 2);
  return JSON.stringify(item || {}, null, 2);
}

function responseCallToolName(item) {
  if (item?.type === 'tool_search_call') return 'tool_search';
  if (typeof item?.name === 'string' && item.name) return item.name;
  if (typeof item?.type === 'string' && item.type.endsWith('_call')) return item.type.slice(0, -'_call'.length);
  return '';
}

function isResponseCallItem(item) {
  return !!(item && typeof item === 'object' && typeof item.type === 'string' && item.type.endsWith('_call'));
}

function responseCallInput(item) {
  if (Object.prototype.hasOwnProperty.call(item, 'arguments')) return parseResponseToolArguments(item.arguments);
  const input = {};
  for (const [key, value] of Object.entries(item || {})) {
    if (['id', 'type', 'status', 'call_id', 'name', 'execution'].includes(key)) continue;
    input[key] = value;
  }
  return input;
}

function isResponseToolResultItem(item) {
  if (!item || typeof item !== 'object' || typeof item.type !== 'string') return false;
  return item.type === 'tool_search_output' || item.type.endsWith('_call_output');
}

function responseToolResultContent(item) {
  if (item?.type === 'tool_search_output') return toolSearchOutputContent(item);
  if (Object.prototype.hasOwnProperty.call(item || {}, 'output')) {
    return typeof item.output === 'string' ? item.output : JSON.stringify(item.output, null, 2);
  }
  const content = {};
  for (const [key, value] of Object.entries(item || {})) {
    if (['id', 'type', 'status', 'call_id', 'execution'].includes(key)) continue;
    content[key] = value;
  }
  return JSON.stringify(content, null, 2);
}

function responseInputItemToMessage(item) {
  if (!item || typeof item !== 'object') return item;
  if (isResponseCallItem(item)) {
    return {
      type: 'message',
      role: 'assistant',
      content: [{
        type: 'tool_use',
        id: item.call_id || item.id || '',
        name: responseCallToolName(item),
        input: responseCallInput(item)
      }]
    };
  }
  if (isResponseToolResultItem(item)) {
    return {
      type: 'message',
      role: 'tool',
      content: [{ type: 'tool_result', tool_use_id: item.call_id || '', content: responseToolResultContent(item) }]
    };
  }
  return item;
}

function normalizeWebSocketDerivedInput(input) {
  if (!Array.isArray(input)) return input;
  return input.map(responseInputItemToMessage);
}

function webSocketOutputMessages(events) {
  const messages = [];
  const items = [];
  for (const event of events || []) {
    if (getEventType(event) !== 'response.output_item.done') continue;
    const data = getEventData(event);
    if (data?.item && Number.isInteger(data.output_index)) items.push({ outputIndex: data.output_index, item: data.item });
  }
  items.sort((a, b) => a.outputIndex - b.outputIndex);
  for (const { item } of items) {
    if (isResponseCallItem(item)) {
      messages.push({
        type: 'message',
        role: 'assistant',
        content: [{
          type: 'tool_use',
          id: item.call_id || item.id || '',
          name: responseCallToolName(item),
          input: responseCallInput(item)
        }]
      });
    } else if (item.type === 'message') {
      messages.push({
        type: 'message',
        role: item.role || 'assistant',
        content: Array.isArray(item.content) ? item.content : []
      });
    }
  }
  return messages;
}

function isToolResultInputItem(item) {
  if (!item || typeof item !== 'object') return false;
  if (isResponseToolResultItem(item)) return true;
  if (item.role !== 'tool') return false;
  const content = Array.isArray(item.content) ? item.content : [];
  return content.some(block => block?.type === 'tool_result');
}

function messageKey(message) {
  try { return JSON.stringify(message); } catch(e) { return String(message); }
}

function uniqueMessages(messages) {
  const seen = new Set();
  const unique = [];
  for (const message of messages) {
    const key = messageKey(message);
    if (seen.has(key)) continue;
    seen.add(key);
    unique.push(message);
  }
  return unique;
}

function regularMessagesFromBody(body) {
  const normalized = normalizeWebSocketDerivedInput(Array.isArray(body?.input) ? body.input : []);
  return normalized.filter(item => !isToolResultInputItem(item));
}

function toolResultMessagesFromInput(input) {
  const normalized = normalizeWebSocketDerivedInput(Array.isArray(input) ? input : []);
  return normalized.filter(isToolResultInputItem);
}

function toolUseIdsFromMessage(message) {
  const content = Array.isArray(message?.content) ? message.content : [];
  return content
    .filter(block => block?.type === 'tool_use')
    .map(block => block.id || block.tool_use_id || '')
    .filter(Boolean);
}

function toolResultIdsFromMessage(message) {
  const content = Array.isArray(message?.content) ? message.content : [];
  return content
    .filter(block => block?.type === 'tool_result')
    .map(block => block.tool_use_id || block.id || '')
    .filter(Boolean);
}

function interleaveWebSocketOutputGroups(outputGroups, toolResults) {
  const resultPool = (toolResults || []).map(message => ({
    message,
    ids: toolResultIdsFromMessage(message),
    used: false
  }));
  const messages = [];
  for (const outputMessages of outputGroups || []) {
    messages.push(...outputMessages);
    const callIds = outputMessages.flatMap(toolUseIdsFromMessage);
    for (const callId of callIds) {
      const matched = resultPool.find(result => !result.used && result.ids.includes(callId));
      if (!matched) continue;
      matched.used = true;
      messages.push(matched.message);
    }
  }
  messages.push(...resultPool.filter(result => !result.used).map(result => result.message));
  return messages;
}

function buildWebSocketHistoryInput(input, priorGroups, priorRequestBodies) {
  const normalized = normalizeWebSocketDerivedInput(Array.isArray(input) ? input : []);
  const regularMessages = uniqueMessages([
    ...(priorRequestBodies || []).flatMap(regularMessagesFromBody),
    ...normalized.filter(item => !isToolResultInputItem(item))
  ]);
  const toolResults = uniqueMessages([
    ...(priorRequestBodies || []).flatMap(body => toolResultMessagesFromInput(body?.input)),
    ...normalized.filter(isToolResultInputItem)
  ]);
  const outputGroups = (priorGroups || []).map(group => webSocketOutputMessages(group.events));
  const priorOutputKeys = new Set(outputGroups.flat().map(messageKey));
  const contextMessages = regularMessages.filter(message => !priorOutputKeys.has(messageKey(message)));
  const interleavedOutputs = interleaveWebSocketOutputGroups(outputGroups, toolResults);
  return uniqueMessages([...contextMessages, ...interleavedOutputs]);
}

function requestBodiesForWebSocketEntry(entry) {
  const events = entry?.request?.ws_events;
  if (Array.isArray(events) && events.length) {
    return events
      .map(event => getEventData(event))
      .filter(event => event && typeof event === 'object');
  }
  return [];
}

function previousResponseIdForGroup(group) {
  const created = responseCreatedFromEvents(group.events);
  const completed = completedResponseFromEvents(group.events);
  return created?.previous_response_id || completed?.previous_response_id || '';
}

function requestBodyForWebSocketGroup(entry, groups, idx) {
  const requestBodies = requestBodiesForWebSocketEntry(entry);
  const previousId = previousResponseIdForGroup(groups[idx]);
  if (previousId) {
    const matched = requestBodies.find(body => body?.previous_response_id === previousId);
    if (matched) return matched;
  }
  const nonPrefetchBodies = requestBodies.filter(body => body?.generate !== false);
  if (nonPrefetchBodies[idx]) return nonPrefetchBodies[idx];
  if (requestBodies[idx]) return requestBodies[idx];
  return idx === 0 ? bodyWithoutToolResultOnlyInput(entry.request?.body) : entry.request?.body;
}

function bodyWithoutToolResultOnlyInput(body) {
  const next = cloneJson(body || {}) || {};
  if (Array.isArray(next.input) && next.input.every(isToolResultInputItem)) {
    next.input = [];
  }
  return next;
}

function buildWebSocketResponseEntry(entry, groups, idx) {
  const group = groups[idx];
  const completed = completedResponseFromEvents(group.events) || {};
  const created = responseCreatedFromEvents(group.events) || {};
  const priorGroups = groups.slice(0, idx);
  const priorRequestBodies = priorGroups.map((_, priorIdx) => requestBodyForWebSocketGroup(entry, groups, priorIdx));
  const requestSource = requestBodyForWebSocketGroup(entry, groups, idx);
  const requestBody = cloneJson(requestSource || {}) || {};
  const source = Object.keys(completed).length ? completed : created;
  for (const key of ['model', 'instructions', 'tools', 'previous_response_id', 'prompt_cache_key', 'tool_choice', 'parallel_tool_calls', 'text', 'reasoning']) {
    if (source[key] !== undefined && source[key] !== null) requestBody[key] = source[key];
  }
  requestBody.input = buildWebSocketHistoryInput(requestBody.input, priorGroups, priorRequestBodies);
  const createdAt = completed.created_at || created.created_at;
  const completedAt = completed.completed_at;
  const durationMs = createdAt && completedAt ? Math.max(0, (completedAt - createdAt) * 1000) : entry.duration_ms;
  return {
    ...cloneJson(entry),
    request_id: `${entry.request_id || 'ws'}:${idx + 1}`,
    turn: `${entry.turn || '?'}.${idx + 1}`,
    duration_ms: durationMs,
    timestamp: createdAt ? new Date(createdAt * 1000).toISOString() : entry.timestamp,
    derived_from_websocket: true,
    websocket_response_index: idx + 1,
    request: {
      ...(cloneJson(entry.request) || {}),
      body: requestBody,
    },
    response: {
      ...(cloneJson(entry.response) || {}),
      body: cloneJson(completed),
      ws_events: group.events,
    },
  };
}

function expandWebSocketResponseEntries(rawEntries) {
  const expanded = [];
  for (const entry of rawEntries || []) {
    if (!isCodexResponsesWebSocketEntry(entry)) {
      expanded.push(entry);
      continue;
    }
    const groups = splitWebSocketResponseEvents(entry.response?.ws_events || []).filter(isDisplayableWebSocketResponseGroup);
    if (groups.length <= 1) {
      expanded.push(entry);
      continue;
    }
    groups.forEach((group, idx) => expanded.push(buildWebSocketResponseEntry(entry, groups, idx)));
  }
  return expanded;
}

/* ─── Lazy loading infrastructure ─── */
const LAZY_THRESHOLD = 50;
let lazyMode = false;
let rawLines = null; // array of raw JSON strings, populated on first access
const entryCache = new Map(); // index -> parsed full entry

function getRawLines() {
  if (rawLines) return rawLines;
  const el = document.getElementById('trace-raw');
  if (!el) return [];
  const text = el.textContent;
  // Free DOM node memory — we no longer need the script element
  el.remove();
  rawLines = text.split('\n').filter(l => l.trim());
  return rawLines;
}

function buildStubEntry(meta, rawIdx) {
  // Build an entry object with the same shape as real entries so existing
  // sidebar rendering code works unchanged. Nested paths are constructed
  // to satisfy property access patterns (e.g. entry.request.body.model).
  const usage = {};
  if (meta.input_tokens) usage.input_tokens = meta.input_tokens;
  if (meta.output_tokens) usage.output_tokens = meta.output_tokens;
  if (meta.cache_read_input_tokens) usage.cache_read_input_tokens = meta.cache_read_input_tokens;
  if (meta.cache_creation_input_tokens) usage.cache_creation_input_tokens = meta.cache_creation_input_tokens;

  // Build a minimal system field to support task fingerprinting
  const body = { model: meta.model || '' };
  if (meta.has_system && meta.sys_hint) {
    body.system = meta.sys_hint;
  }
  if (meta.tool_names && meta.tool_names.length) {
    body.tools = meta.tool_names.map(n => ({ name: n }));
  }

  // Build minimal response content for tool filter
  const respContent = [];
  if (meta.response_tool_names && meta.response_tool_names.length) {
    meta.response_tool_names.forEach(n => respContent.push({ type: 'tool_use', name: n }));
  }

  return {
    _isStub: true,
    _rawIdx: rawIdx,
    turn: meta.turn,
    request_id: meta.request_id || '',
    timestamp: meta.timestamp || '',
    duration_ms: meta.duration_ms || 0,
    request: {
      method: meta.method || '',
      path: meta.path || '',
      body: body,
    },
    response: {
      status: meta.status || 0,
      body: {
        usage: usage,
        content: respContent.length ? respContent : undefined,
        error: meta.error_message ? { message: meta.error_message } : undefined,
      },
    },
  };
}

function toolDisplayName(td) {
  if (!td || typeof td !== 'object') return '';
  const candidates = [
    td.name,
    td.function && typeof td.function === 'object' ? td.function.name : null,
    td.id,
    td.type
  ];
  for (const value of candidates) {
    if (typeof value === 'string' && value) return value;
  }
  return '';
}

function toolDescription(td) {
  if (!td || typeof td !== 'object') return '';
  const desc = td.description || (td.function && typeof td.function === 'object' ? td.function.description : '');
  return typeof desc === 'string' ? desc : '';
}

function toolSchema(td) {
  if (!td || typeof td !== 'object') return {};
  return td.input_schema || td.parameters || (td.function && typeof td.function === 'object' ? td.function.parameters : null) || {};
}

function getFullEntry(entry) {
  if (!entry._isStub) return entry;
  const idx = entry._rawIdx;
  if (entryCache.has(idx)) return entryCache.get(idx);
  const lines = getRawLines();
  if (idx < 0 || idx >= lines.length) return entry;
  try {
    const full = JSON.parse(lines[idx]);
    entryCache.set(idx, full);
    return full;
  } catch (e) {
    console.error('Failed to parse entry at index', idx, e);
    return entry;
  }
}

/* ─── Virtual scroll state ─── */
let virtualMode = false;
const VS_ITEM_HEIGHT = 68;
const VS_BUFFER = 10;
let vsFilteredItems = []; // {entry, idx} pairs for virtual scroll

const globalSearchState = {
  open: false,
  query: '',
  matchCounts: [],
  totalMatches: 0,
  currentMatch: -1,
  textCache: new Map(),
};
const TRACE_JSONL_PATH = typeof __TRACE_JSONL_PATH__ !== 'undefined' ? __TRACE_JSONL_PATH__ : '';
const TRACE_HTML_PATH = typeof __TRACE_HTML_PATH__ !== 'undefined' ? __TRACE_HTML_PATH__ : '';
const CLAUDE_TAP_VERSION = typeof __CLAUDE_TAP_VERSION__ !== 'undefined' ? __CLAUDE_TAP_VERSION__ : '';

/* ─── i18n ─── */
const I18N = {
  en: {
    title: "claude-tap", stats_turns: "Turns", stats_tokens: "Total API tokens", stats_time: "Time",
    stats_tokens_hint: "Sum of input and output tokens across captured requests; this is not the current Claude Code /context usage.",
    drop_title: "Load Trace File", drop_desc: "Drag & drop a .jsonl trace file, or click to browse", drop_btn: "Choose File",
    turn: "Turn", tok: "tok",
    btn_request_json: "Request JSON", btn_curl: "cURL", btn_diff: "Diff with Prev",
    section_system: "System Prompt", section_messages: "Messages", section_tools: "Tools",
    section_context: "Request Context", section_response: "Response", section_usage: "Token Usage", section_sse: "SSE Events", section_json: "Full JSON",
    copy: "Copy", copied: "Copied!",
    params: "Parameters", required: "required",
    tok_input: "Input", tok_output: "Output", tok_cache_read: "Cache Read", tok_cache_create: "Cache Create",
    empty_state: "No entries for selected paths", no_prev: "No previous request",
    no_content: "No content", no_messages: "No messages in either request",

function detectLang() {
  const supported = ['en','zh-CN','ja','ko','fr','ar','de','ru'];
  const nav = navigator.language || navigator.userLanguage || 'en';
  if (supported.includes(nav)) return nav;
  const prefix = nav.split('-')[0];
  if (prefix === 'zh') return 'zh-CN';
  const match = supported.find(s => s.startsWith(prefix));
  return match || 'en';
}
let currentLang = localStorage.getItem('claude-tap-lang') || detectLang();
function t(key) { return (I18N[currentLang] || I18N.en)[key] || I18N.en[key] || key; }
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('claude-tap-lang', lang);
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  $('#lang-select').value = lang;
  updateStaticTexts();
  if (filtered.length) { applyFilter(); selectEntry(activeIdx >= 0 ? activeIdx : 0); }
}
function updateStaticTexts() {
  const e = id => document.getElementById(id);
  if (e('logo-text')) e('logo-text').textContent = t('title');
  if (e('logo-version')) {

/* ─── Live Mode SSE Support ─── */
let liveEventSource = null;
let liveConnected = false;
let currentDetailRequestId = null;
let liveRecords = [];
let viewingDate = null; // null = live, string = historical date
let liveRenderTimer = null;
const liveSeenIds = new Set();

function initLiveMode() {
  const statusEl = $('#live-status');
  statusEl.style.display = 'flex';
  updateLiveStatus('connecting');

  liveEventSource = new EventSource('/events');

  liveEventSource.onopen = () => {
    liveConnected = true;
    updateLiveStatus('connected', liveRecords.length);
  };

  liveEventSource.onmessage = (event) => {
    try {
      const record = JSON.parse(event.data);
      // Deduplicate: SSE replays full history on each reconnect
      const id = record.request_id || record.req_id;
      if (id && liveSeenIds.has(id)) return;
      if (id) liveSeenIds.add(id);

      liveRecords.push(record);
      if (!viewingDate) {
        entries.push(...expandWebSocketResponseEntries([record]));
        updateLiveStatus('connected', entries.length);
        clearTimeout(liveRenderTimer);
        liveRenderTimer = setTimeout(() => renderApp(true), 50);
      }
    } catch (e) {
      console.error('Failed to parse SSE data:', e);
    }
  };

  // EventSource auto-reconnects on transient errors;
  // only update status indicator here.
  liveEventSource.onerror = () => {
    liveConnected = false;
    updateLiveStatus('disconnected');
  };
}

function updateLiveStatus(status, count) {
  const el = $('#live-status');
  if (!el) return;
  const colors = {
    connecting: { bg: 'var(--amber-bg)', color: 'var(--amber)', dot: 'var(--amber)' },
    connected: { bg: 'var(--green-bg)', color: 'var(--green)', dot: 'var(--green)' },
    disconnected: { bg: 'var(--red-bg)', color: 'var(--red)', dot: 'var(--red)' }
  };
  const c = colors[status] || colors.connecting;
  const labels = { connecting: 'Connecting...', connected: 'Live', disconnected: 'Disconnected' };
  const countText = count !== undefined ? ` (${count})` : '';
  el.style.background = c.bg;
  el.style.color = c.color;
  el.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${c.dot};${status === 'connected' ? 'animation:pulse 2s infinite;' : ''}"></span>${labels[status]}${countText}`;
}

async function fetchDates() {
  try {
    const resp = await fetch('/api/dates');
    const data = await resp.json();
    const sel = $('#date-select');
    if (!sel || !data.dates) return;
    sel.innerHTML = '<option value="live">Live (current session)</option>';
    for (const d of data.dates) {
      sel.insertAdjacentHTML('beforeend', `<option value="${d}">${d}</option>`);
    }
    if (data.has_legacy) {
      sel.insertAdjacentHTML('beforeend', '<option value="legacy">Legacy (flat)</option>');
    }
    const picker = $('#date-picker');
    if (picker) picker.style.display = 'flex';
  } catch (e) {
    console.error('Failed to fetch dates:', e);
  }
}

async function onDateChange(value) {
  if (value === 'live') {
    viewingDate = null;
    entries = expandWebSocketResponseEntries(liveRecords.slice());
    renderApp(true);
    return;
  }
  viewingDate = value;
  try {
    const resp = await fetch('/api/traces/' + encodeURIComponent(value));
    entries = expandWebSocketResponseEntries(await resp.json());
    renderApp();
  } catch (e) {
    console.error('Failed to load traces for date:', value, e);
  }
}

if (typeof LIVE_MODE !== 'undefined' && LIVE_MODE) {
  entries = typeof EMBEDDED_TRACE_DATA !== 'undefined' ? expandWebSocketResponseEntries(EMBEDDED_TRACE_DATA) : [];
  document.addEventListener('DOMContentLoaded', () => {
    initTheme(); initLang(); initGlobalSearch();
    initLiveMode();
    fetchDates();
    if (entries.length) renderApp();
    else {
      // Show waiting state
      $('#drop-zone').innerHTML = '<div style="text-align:center;padding:60px 20px;"><div style="font-size:48px;margin-bottom:16px;">📡</div><h2 style="margin-bottom:8px;">Waiting for API calls...</h2><p style="color:var(--text-secondary);">Start using Claude Code to see traces here in real-time</p></div>';
    }
  });
} else if (typeof EMBEDDED_TRACE_META !== 'undefined' && EMBEDDED_TRACE_META.length) {
  // Lazy mode: build stub entries from metadata
  lazyMode = true;
  entries = EMBEDDED_TRACE_META.map((meta, i) => buildStubEntry(meta, i));
  document.addEventListener('DOMContentLoaded', () => { initTheme(); initLang(); initGlobalSearch(); renderApp(); });
} else if (typeof EMBEDDED_TRACE_DATA !== 'undefined' && EMBEDDED_TRACE_DATA.length) {
  entries = expandWebSocketResponseEntries(EMBEDDED_TRACE_DATA);
  document.addEventListener('DOMContentLoaded', () => { initTheme(); initLang(); initGlobalSearch(); renderApp(); });
} else {
  document.addEventListener('DOMContentLoaded', () => {
    initTheme(); initLang(); initGlobalSearch();
    const dropInner = $('#drop-inner'), fileInput = $('#file-input');
    ['dragover','dragenter'].forEach(e => dropInner.addEventListener(e, ev => { ev.preventDefault(); dropInner.classList.add('dragover'); }));
    ['dragleave','drop'].forEach(e => dropInner.addEventListener(e, () => dropInner.classList.remove('dragover')));
    dropInner.addEventListener('drop', ev => { ev.preventDefault(); if (ev.dataTransfer.files.length) loadFile(ev.dataTransfer.files[0]); });
    fileInput.addEventListener('change', () => { if (fileInput.files.length) loadFile(fileInput.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    entries = expandWebSocketResponseEntries(reader.result.trim().split('\n').map(line => { try { return JSON.parse(line); } catch { return null; } }).filter(Boolean));
    if (!entries.length) { alert('No valid entries found / 未找到有效条目'); return; }
    renderApp();
  };
  reader.readAsText(file);
}

/* ─── Path & filter ─── */
function getPath(e) { return (e.request?.path || '/unknown').replace(/\?.*$/, ''); }

function renderApp(preserveDetail) {
  $('#drop-zone').style.display = 'none';
  $('#sidebar-wrap').style.display = 'flex';
  $('#detail').style.display = '';
  $('#stats').style.display = '';
  $('#path-filter').style.display = '';
  const pathCounts = {};
  entries.forEach(e => { const p = getPath(e); pathCounts[p] = (pathCounts[p] || 0) + 1; });
  const paths = Object.keys(pathCounts).sort();
  if (activePaths.size === 0) {
    /* If the trace has main conversation paths, hide auxiliary setup calls by default. */
    const primaryPaths = paths.filter(isPathPrimary);
    if (primaryPaths.length > 0) primaryPaths.forEach(p => activePaths.add(p));
    else paths.forEach(p => activePaths.add(p));
  }
  renderPathFilter(paths, pathCounts);
  renderTracePathBar();
  applyFilter(preserveDetail);
}

function renderTracePathBar() {
